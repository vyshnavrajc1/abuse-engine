openapi: 3.0.0
info:
  title: APISentry Monitored API (CICIDS2017-compatible)
  version: 2.0.0
  description: >
    Represents the network/API surface being monitored.
    CICIDS2017 flows are mapped to API-style paths by protocol/port so that the
    semantic agent can apply enumeration, volume, and probing rules.

# Thresholds used by the semantic agent's volume_mismatch rule.
# Override per-deployment in configs/tenant_*.yaml.
x-volume-thresholds:
  low:    5
  medium: 20
  high:   100

paths:
  # ── High-volume HTTP / HTTPS traffic ───────────────────────────────────
  /api/http:
    get:
      operationId: httpTraffic
      summary: General HTTP traffic endpoint
      x-endpoint-type: collection
      x-expected-rate: high
      security: []          # public — semantic ownership rules don't apply
      responses:
        '200': {description: OK}
        '403': {description: Forbidden}
        '404': {description: Not Found}

  /api/https:
    get:
      operationId: httpsTraffic
      summary: General HTTPS traffic endpoint
      x-endpoint-type: collection
      x-expected-rate: high
      security: []
      responses:
        '200': {description: OK}
        '403': {description: Forbidden}

  # ── Generic service by port (DNS, NTP, LDAP, Kerberos, …) ─────────────
  /api/svc/{port}:
    get:
      operationId: genericServiceByPort
      summary: >
        Network service accessed by destination port.
        High enumeration signal: legitimate clients use ≤2 distinct ports;
        scanners enumerate many ports in a short window.
      x-endpoint-type: single_object
      x-expected-rate: low
      parameters:
        - name: port
          in: path
          required: true
          x-owner: false      # port numbers are not user-owned objects
          schema:
            type: integer
            minimum: 1
            maximum: 65535
      security:
        - bearerAuth: []
      responses:
        '200': {description: OK}
        '403': {description: Forbidden}
        '404': {description: Service Not Found}

  # ── SSH (BruteForce target) ─────────────────────────────────────────────
  /api/ssh:
    get:
      operationId: sshService
      summary: >
        SSH service endpoint. Repeated access from a single source IP within a
        short window is a strong brute-force signal.
      x-endpoint-type: single_object
      x-expected-rate: low
      security:
        - bearerAuth: []
      responses:
        '200': {description: Authenticated}
        '401': {description: Unauthorized — wrong credentials}
        '403': {description: Forbidden}

  # ── FTP (BruteForce target) ──────────────────────────────────────────────
  /api/ftp:
    get:
      operationId: ftpService
      summary: >
        FTP service endpoint. High error rates (421/530) indicate brute-force.
      x-endpoint-type: single_object
      x-expected-rate: low
      security:
        - bearerAuth: []
      responses:
        '200': {description: OK}
        '421': {description: Service Not Available}
        '530': {description: Not Logged In}

  # ── Direct port access (port-scan signal) ───────────────────────────────
  /api/port/{port}:
    get:
      operationId: directPortAccess
      summary: >
        Direct port access. Any single source IP accessing >5 distinct port
        values in a window is a strong port-scan / reconnaissance signal.
      x-endpoint-type: single_object
      x-expected-rate: low
      parameters:
        - name: port
          in: path
          required: true
          x-owner: false
          schema:
            type: integer
            minimum: 1
            maximum: 65535
      security:
        - bearerAuth: []
      responses:
        '200': {description: OK}
        '403': {description: Forbidden}
        '404': {description: Port Closed}

  # ── Application-layer API endpoints (for real API gateway logs) ─────────
  /api/users/{id}:
    get:
      operationId: getSingleUser
      summary: Get a single user object — BOLA / IDOR target.
      x-endpoint-type: single_object
      x-expected-rate: medium
      parameters:
        - name: id
          in: path
          required: true
          x-owner: true     # user should only access their own record
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        '200': {description: OK}
        '403': {description: Forbidden — accessing another user's data}
        '404': {description: User Not Found}

  /api/users:
    get:
      operationId: listUsers
      summary: List users — high volume is an enumeration signal.
      x-endpoint-type: collection
      x-expected-rate: low
      security:
        - bearerAuth: []
      responses:
        '200': {description: OK}
        '403': {description: Forbidden}

  /api/admin/{resource}:
    get:
      operationId: adminResource
      summary: Admin endpoints — any non-admin access is an ownership violation.
      x-endpoint-type: admin
      x-expected-rate: low
      parameters:
        - name: resource
          in: path
          required: true
          x-owner: false
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        '200': {description: OK}
        '401': {description: Unauthorized}
        '403': {description: Forbidden — admin only}

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer